name: NPM Registry Cleanup

# This allows you to trigger the workflow manually from the GitHub UI
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Fix Tags and Unpublish
        # Replace NPM_TOKEN with whatever secret name your publish workflow uses
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Nuking broken version ${{ github.event.inputs.broken_version }} from orbit..."
          npm unpublish @moltendb-web/core@0.1.0-alpha.21 
          
  
          
