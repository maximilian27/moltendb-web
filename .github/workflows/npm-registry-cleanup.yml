name: NPM Registry Cleanup

# This allows you to trigger the workflow manually from the GitHub UI
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Fix Tags and Unpublish
        # Replace NPM_TOKEN with whatever secret name your publish workflow uses
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Moving latest tag to alpha.20..."
          npm dist-tag add @moltendb-web/core@0.1.0-alpha.20 latest
          
